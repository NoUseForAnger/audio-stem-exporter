name: Build Audio Stem Exporter

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [master]

env:
  PLUGIN_NAME: obs-mp3-writer

jobs:

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64

      - name: Package ZIP
        run: |
          New-Item -ItemType Directory -Force -Path pkg\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path pkg\data\obs-plugins\${{ env.PLUGIN_NAME }}\locale | Out-Null
          Copy-Item build_x64\RelWithDebInfo\${{ env.PLUGIN_NAME }}.dll pkg\obs-plugins\64bit\
          Copy-Item data\locale\en-US.ini pkg\data\obs-plugins\${{ env.PLUGIN_NAME }}\locale\
          Compress-Archive -Path pkg\* -DestinationPath "AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip

  # ── macOS universal ───────────────────────────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-15
    defaults:
      run:
        shell: zsh --no-rcs --errexit --pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        run: sudo xcode-select --switch /Applications/Xcode_16.1.0.app/Contents/Developer

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build --preset macos

      - name: Package ZIP
        run: |
          mkdir -p pkg/obs-plugins/64bit
          mkdir -p pkg/data/obs-plugins/${{ env.PLUGIN_NAME }}/locale
          cp build_macos/RelWithDebInfo/${{ env.PLUGIN_NAME }}.dylib pkg/obs-plugins/64bit/
          cp data/locale/en-US.ini pkg/data/obs-plugins/${{ env.PLUGIN_NAME }}/locale/
          zip -r "AudioStemExporter-${{ github.ref_name }}-macOS.zip" pkg/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: AudioStemExporter-${{ github.ref_name }}-macOS.zip

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip
            AudioStemExporter-${{ github.ref_name }}-macOS.zip
