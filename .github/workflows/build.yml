name: Build Audio Stem Exporter

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [master]

env:
  PLUGIN_NAME: obs-mp3-writer

jobs:

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64

      - name: Package ZIP
        run: |
          New-Item -ItemType Directory -Force -Path pkg\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path pkg\data\obs-plugins\${{ env.PLUGIN_NAME }}\locale | Out-Null
          Copy-Item build_x64\RelWithDebInfo\${{ env.PLUGIN_NAME }}.dll pkg\obs-plugins\64bit\
          Copy-Item data\locale\en-US.ini pkg\data\obs-plugins\${{ env.PLUGIN_NAME }}\locale\
          Compress-Archive -Path pkg\* -DestinationPath "AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip

  # ── macOS universal ───────────────────────────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-15
    defaults:
      run:
        shell: zsh --no-rcs --errexit --pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        run: sudo xcode-select --switch /Applications/Xcode_16.1.0.app/Contents/Developer

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build --preset macos

      - name: Package ZIP and PKG
        run: |
          cmake --install build_macos --prefix ./pkg --config RelWithDebInfo
          cd pkg && zip -r "../AudioStemExporter-${{ github.ref_name }}-macOS.zip" . && cd ..
          pkgbuild --root ./pkg \
                   --identifier digital.1134.audio-stem-exporter \
                   --version ${{ github.ref_name }} \
                   --install-location "/Library/Application Support/obs-studio/plugins" \
                   "AudioStemExporter-${{ github.ref_name }}-macOS.pkg"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: AudioStemExporter-${{ github.ref_name }}-macOS.zip

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: AudioStemExporter-${{ github.ref_name }}-macOS.pkg

  # ── Linux x86_64 ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake \
            libobs-dev obs-studio \
            qt6-base-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswresample-dev

      - name: Configure
        run: cmake --preset linux-x86_64

      - name: Build
        run: cmake --build --preset linux-x86_64

      - name: Package ZIP
        run: |
          cmake --install build_linux --prefix ./pkg --config RelWithDebInfo
          cd pkg && zip -r "../AudioStemExporter-${{ github.ref_name }}-Linux-x86_64.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: AudioStemExporter-${{ github.ref_name }}-Linux-x86_64.zip

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Download macOS ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip

      - name: Download macOS PKG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip
            AudioStemExporter-${{ github.ref_name }}-macOS.zip
            AudioStemExporter-${{ github.ref_name }}-macOS.pkg
            AudioStemExporter-${{ github.ref_name }}-Linux-x86_64.zip
