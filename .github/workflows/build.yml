name: Build obs-mp3-writer

on:
  push:
    branches: [main]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'       # e.g. 1.0.0  → triggers release build
      - '[0-9]+.[0-9]+.[0-9]+-*'     # e.g. 1.0.0-beta1
  pull_request:
    branches: [main]

env:
  PLUGIN_NAME: obs-mp3-writer

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # The obs-plugintemplate CI helper downloads OBS + deps and configures CMake.
      # See: https://github.com/obsproject/obs-plugintemplate
      - name: Setup OBS build environment
        uses: obsproject/obs-plugintemplate/.github/actions/setup-obs@main

      - name: Configure (RelWithDebInfo)
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64

      # ── Artifact for non-release builds ─────────────────────────────────────
      - name: Package (zip)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          cmake --install build_x64 --prefix dist --config RelWithDebInfo
          Compress-Archive -Path dist\* -DestinationPath "${{ env.PLUGIN_NAME }}-${{ github.sha }}-windows.zip"

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ github.sha }}-windows
          path: ${{ env.PLUGIN_NAME }}-${{ github.sha }}-windows.zip

      # ── Installer for tagged releases (Batch C: Inno Setup via CPack) ───────
      # Uncomment when buildspec.json hashes are filled in and CPack is configured:
      # - name: Build installer
      #   if: startsWith(github.ref, 'refs/tags/')
      #   run: cmake --build --preset windows-x64 --target package
