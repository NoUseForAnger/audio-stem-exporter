name: Build Audio Stem Exporter

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [master]

env:
  PLUGIN_NAME: obs-mp3-writer

jobs:

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64

      - name: Install
        run: cmake --install build_x64 --prefix dist --config RelWithDebInfo

      - name: Package ZIP
        run: Compress-Archive -Path dist\* -DestinationPath "AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip

  # ── macOS universal ───────────────────────────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build --preset macos

      - name: Install
        run: cmake --install build_macos --prefix dist --config RelWithDebInfo

      - name: Package ZIP
        run: zip -r "AudioStemExporter-${{ github.ref_name }}-macOS.zip" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: AudioStemExporter-${{ github.ref_name }}-macOS.zip

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            AudioStemExporter-${{ github.ref_name }}-Windows-x64.zip
            AudioStemExporter-${{ github.ref_name }}-macOS.zip
